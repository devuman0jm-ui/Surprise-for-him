<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cinematic Intro</title>

<style>
body{
margin:0;
height:100vh;
background:black;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:Poppins;
}

/* BACKGROUND DARK GLOW */
.bg{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle at center, #1a0000, #000);
opacity:0;
animation:bgFade 3s forwards;
}

@keyframes bgFade{
to{opacity:1;}
}

/* MAIN LOGO TEXT */
.logo{
font-size:4rem;
font-weight:bold;
color:#ff2a2a;
letter-spacing:3px;
opacity:0;
transform:scale(0.6);
animation:intro 3s ease forwards;
text-shadow:0 0 30px #ff0000;
z-index:2;
}

@keyframes intro{
0%{opacity:0; transform:scale(0.6);}
40%{opacity:1; transform:scale(1.1);}
70%{transform:scale(1);}
100%{opacity:1;}
}

/* SUB TEXT */
.sub{
position:absolute;
bottom:80px;
color:white;
opacity:0;
font-size:1rem;
letter-spacing:2px;
animation:fadeIn 2s 2s forwards;
}

@keyframes fadeIn{
to{opacity:0.7;}
}

/* SKIP BUTTON */
.skip{
position:absolute;
top:20px;
right:20px;
padding:8px 15px;
border:1px solid white;
background:transparent;
color:white;
cursor:pointer;
opacity:0.7;
}

.skip:hover{
background:white;
color:black;
}

/* FADE OUT TRANSITION */
.fadeOut{
animation:out 1.5s forwards;
}

@keyframes out{
to{opacity:0; transform:scale(1.2);}
}
</style>
</head>

<body>

<div class="bg"></div>

<button class="skip" onclick="skipIntro()">Skip</button>

<div class="logo" id="logo">A STORY FOR YOU</div>

<div class="sub">A cinematic emotional experience is starting...</div>

<!-- OPTIONAL MUSIC -->
<audio id="sound" autoplay>
  <source src="https://www.soundjay.com/misc/sounds/cinematic-boom-1.mp3">
</audio>

<script>
setTimeout(() => {
  document.body.classList.add("fadeOut");

  setTimeout(() => {
    window.location.href = "letter.html";
  }, 1200);

}, 4500);

function skipIntro(){
  window.location.href = "letter.html";
}
</script>

</body>
</html>
