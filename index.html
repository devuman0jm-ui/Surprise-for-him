<!DOCTYPE html>
<html>
<head>
<title>For My Love ❤️</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
overflow-x:hidden;
color:white;
}

.container{
padding:50px 20px;
}

h1{
font-size:3em;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff4d88;
cursor:pointer;
}

#message{
display:none;
margin-top:30px;
font-size:22px;
}

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-100vh);}
}
</style>
</head>

<body>

<div class="container">
<h1>❤️ For My Love ❤️</h1>

<p>A little surprise made just for you.</p>

<button onclick="showLove()">Open Surprise 🎁</button>

<div id="message">
<h2>You make my world brighter ✨</h2>
<p>
Thank you for all the laughs, memories and happiness.
You are one of the most special people in my life ❤️
</p>
</div>

</div>

<script>

function showLove(){
document.getElementById("message").style.display="block";
}

setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

},300);

</script>

</body>
</html>
